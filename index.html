<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Weight of Steps</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 2s ease-in-out, background-color 3s ease-in-out;
        }

        .story-text {
            font-size: 24px;
            letter-spacing: 1.5px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            max-width: 60%;
            line-height: 1.6;
            text-shadow: 0px 0px 10px rgba(0,0,0,0.8);
        }

        #start-btn {
            pointer-events: auto;
            margin-top: 30px;
            padding: 12px 30px;
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            font-family: 'Sarabun', sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #start-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        .fade-in { opacity: 1 !important; }
        .fade-out { opacity: 0 !important; }
        
        .light-mode {
            background-color: #f5f5f5 !important;
            color: #111111 !important;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="story" class="story-text"></div>
        <button id="start-btn">ก้าวเดิน</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiLayer = document.getElementById('ui-layer');
    const storyEl = document.getElementById('story');
    const startBtn = document.getElementById('start-btn');

    let width, height;
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Audio System (Generative Synthesis)
    let audioCtx;
    let bgmOsc, bgmGain;
    
    function initAudio() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();

        // Dark Ambient Drone
        bgmOsc = audioCtx.createOscillator();
        bgmOsc.type = 'triangle';
        bgmOsc.frequency.value = 55; // Low frequency

        bgmGain = audioCtx.createGain();
        bgmGain.gain.value = 0.1;

        bgmOsc.connect(bgmGain);
        bgmGain.connect(audioCtx.destination);
        bgmOsc.start();
    }

    function playHitSound() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
        
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function playCollectSound() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function transitionToLightAudio() {
        if(!audioCtx) return;
        bgmOsc.frequency.linearRampToValueAtTime(220, audioCtx.currentTime + 5);
        bgmOsc.type = 'sine';
        bgmGain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 5);
        
        const chordArr = [277.18, 329.63, 415.30]; // C#m chord transitioning to light
        chordArr.forEach((freq, index) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 5 + index);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
        });
    }

    // Game Entities
    const player = { x: width/2, y: height - 100, radius: 15, targetX: width/2, targetY: height - 100 };
    const followers = [];
    const numFollowers = 5;
    for(let i=0; i<numFollowers; i++) {
        followers.push({ x: player.x, y: player.y + (i+1)*30, radius: 8 });
    }

    let obstacles = [];
    let fragments = [];
    const targetWord = ["ห", "ว", "ั", "ง"];
    let collectedWord = [];

    // Game State
    let gameState = 'START'; // START, CARRY, STORM, PUZZLE, END
    let storyTimer = 0;
    let frames = 0;
    let targetAlpha = 1; // For drawing light

    // Controls
    window.addEventListener('mousemove', (e) => {
        if(gameState === 'START' || gameState === 'END') return;
        player.targetX = e.clientX;
        player.targetY = e.clientY;
    });

    window.addEventListener('touchmove', (e) => {
        if(gameState === 'START' || gameState === 'END') return;
        player.targetX = e.touches[0].clientX;
        player.targetY = e.touches[0].clientY;
    });

    // Story Sequence
    const storyLines = [
        "ฉันแบกรับบางสิ่งไว้มากมาย...",
        "สายตาและความคาดหวังที่ฝากไว้บนบ่า",
        "เราทุกคนต้องก้าวไปพร้อมกัน ฉันจะไม่ทิ้งใครไว้ข้างหลัง",
        "แต่ทำไมบางครั้ง... ผู้คนถึงได้สาดเทถ้อยคำที่เจ็บปวด?",
        "ปกป้องพวกเขาจากคำพูดเหล่านั้น",
        "และรวบรวมชิ้นส่วนเพื่อสร้างเส้นทางของเราขึ้นมาใหม่"
    ];
    let currentStoryLine = 0;

    function showStory(text, duration = 4000) {
        storyEl.innerText = text;
        storyEl.classList.add('fade-in');
        setTimeout(() => {
            if(gameState !== 'END') storyEl.classList.remove('fade-in');
        }, duration);
    }

    startBtn.addEventListener('click', () => {
        initAudio();
        startBtn.style.display = 'none';
        gameState = 'CARRY';
        advanceStory();
    });

    function advanceStory() {
        if(currentStoryLine < storyLines.length) {
            showStory(storyLines[currentStoryLine]);
            currentStoryLine++;
            setTimeout(advanceStory, 6000);
        } else {
            gameState = 'STORM';
            setTimeout(() => { gameState = 'PUZZLE'; spawnFragments(); }, 20000); // 20 seconds of storm
        }
    }

    function spawnFragments() {
        targetWord.forEach((char, index) => {
            fragments.push({
                char: char,
                x: Math.random() * (width - 100) + 50,
                y: Math.random() * (height/2 - 100) + 50,
                radius: 20,
                collected: false
            });
        });
    }

    function updatePhysics() {
        if(gameState === 'START' || gameState === 'END') return;

        // Player movement (heavy, dragging feeling)
        player.x += (player.targetX - player.x) * 0.05;
        player.y += (player.targetY - player.y) * 0.05;

        // Followers follow (chain physics)
        let leadX = player.x;
        let leadY = player.y;
        for(let i=0; i<followers.length; i++) {
            let f = followers[i];
            let dx = leadX - f.x;
            let dy = leadY - f.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist > 25) {
                f.x += dx * 0.1;
                f.y += dy * 0.1;
            }
            leadX = f.x;
            leadY = f.y;
        }

        // Obstacles (The harsh words)
        if(gameState === 'STORM' || gameState === 'PUZZLE') {
            if(frames % 40 === 0) {
                obstacles.push({
                    x: Math.random() > 0.5 ? 0 : width,
                    y: Math.random() * height,
                    vx: (Math.random() * 4 + 2) * (Math.random() > 0.5 ? 1 : -1),
                    vy: (Math.random() - 0.5) * 2,
                    length: Math.random() * 40 + 20
                });
            }

            for(let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x += o.vx;
                o.y += o.vy;

                // Collision with player (Player blocks it)
                let distToPlayer = Math.hypot(player.x - o.x, player.y - o.y);
                if(distToPlayer < player.radius + 15) {
                    playHitSound();
                    obstacles.splice(i, 1);
                    // Visual feedback: Screen shake could be added here
                    continue;
                }

                // Collision with followers (The pain)
                for(let f of followers) {
                    let distToFollower = Math.hypot(f.x - o.x, f.y - o.y);
                    if(distToFollower < f.radius + 10) {
                        playHitSound();
                        obstacles.splice(i, 1);
                        f.hurt = 30; // Flash red frames
                        break;
                    }
                }

                if(o.x < -100 || o.x > width + 100 || o.y < -100 || o.y > height + 100) {
                    obstacles.splice(i, 1);
                }
            }
        }

        // Puzzle Logic
        if(gameState === 'PUZZLE') {
            for(let frag of fragments) {
                if(!frag.collected) {
                    let dist = Math.hypot(player.x - frag.x, player.y - frag.y);
                    if(dist < player.radius + frag.radius) {
                        frag.collected = true;
                        collectedWord.push(frag.char);
                        playCollectSound();
                        
                        if(collectedWord.length === targetWord.length) {
                            triggerEnding();
                        }
                    }
                }
            }
        }
    }

    function triggerEnding() {
        gameState = 'END';
        uiLayer.classList.add('light-mode');
        transitionToLightAudio();
        showStory("เมื่อเราไม่ยอมแพ้ และประคองกันจนผ่านพ้น... แสงสว่างจึงปรากฏขึ้น เรามาถึงแล้ว", 100000);
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        if(gameState === 'END') {
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, width, height);
            
            // Draw peaceful entities
            ctx.fillStyle = '#111111';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
            ctx.fill();

            for(let f of followers) {
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2);
                ctx.fill();
            }
            return;
        }

        // Draw Player Aura
        let aura = ctx.createRadialGradient(player.x, player.y, player.radius, player.x, player.y, player.radius + 30);
        aura.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
        aura.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = aura;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius + 30, 0, Math.PI*2);
        ctx.fill();

        // Draw Player
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
        ctx.fill();

        // Draw Followers and connections
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 2;
        let leadX = player.x;
        let leadY = player.y;
        
        for(let f of followers) {
            ctx.beginPath();
            ctx.moveTo(leadX, leadY);
            ctx.lineTo(f.x, f.y);
            ctx.stroke();

            ctx.fillStyle = f.hurt > 0 ? '#ff4444' : '#aaaaaa';
            if(f.hurt > 0) f.hurt--;

            ctx.beginPath();
            ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2);
            ctx.fill();

            leadX = f.x;
            leadY = f.y;
        }

        // Draw Obstacles (Harsh words)
        ctx.strokeStyle = '#555555';
        ctx.lineWidth = 3;
        for(let o of obstacles) {
            ctx.beginPath();
            ctx.moveTo(o.x, o.y);
            ctx.lineTo(o.x - (o.vx * o.length * 0.1), o.y - (o.vy * o.length * 0.1));
            ctx.stroke();
        }

        // Draw Fragments (Words to assemble)
        if(gameState === 'PUZZLE') {
            ctx.font = "20px 'Sarabun'";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            for(let frag of fragments) {
                if(!frag.collected) {
                    // Glow effect
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "white";
                    ctx.fillStyle = "#ffffff";
                    ctx.fillText(frag.char, frag.x, frag.y);
                    ctx.shadowBlur = 0; // Reset
                }
            }

            // Draw collected progress
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.font = "24px 'Sarabun'";
            ctx.fillText("ประกอบเส้นทาง: " + collectedWord.join(" "), width/2, 50);
        }
    }

    function loop() {
        updatePhysics();
        draw();
        frames++;
        requestAnimationFrame(loop);
    }

    loop();

</script>
</body>
</html>
