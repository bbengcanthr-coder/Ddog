<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Weight We Carry</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #ffffff;
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .text-container {
            width: 80%;
            max-width: 800px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease, transform 2s ease;
            text-shadow: 0px 0px 15px rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .text-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-weight: 200;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            line-height: 1.8;
            letter-spacing: 1px;
        }

        .btn-start {
            pointer-events: auto;
            margin-top: 40px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.2rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 4px;
            letter-spacing: 2px;
        }

        .btn-start:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        #interaction-hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            font-weight: 200;
            color: rgba(255, 255, 255, 0.4);
            opacity: 0;
            transition: opacity 1s ease;
            letter-spacing: 1px;
        }

        .fade-to-white {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 5s ease-in-out;
        }

        .final-text {
            color: #000;
            text-shadow: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="story-text" class="text-container">
            <h1 id="text-content"></h1>
            <button id="start-btn" class="btn-start">เริ่มต้นการเดินทาง</button>
        </div>
        <div id="interaction-hint"></div>
    </div>

    <div id="white-screen" class="fade-to-white"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const textContent = document.getElementById('text-content');
        const textContainer = document.getElementById('story-text');
        const startBtn = document.getElementById('start-btn');
        const interactionHint = document.getElementById('interaction-hint');
        const whiteScreen = document.getElementById('white-screen');

        let width, height;
        let animationId;
        let phase = 'start';
        
        let mouse = { x: 0, y: 0, isDown: false, radius: 50 };
        
        // Audio Context (Web Audio API)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let ambientOscillator;
        let ambientGain;

        const storyNodes = [
            { text: "ฉันแบกรับบางสิ่งบางอย่างไว้มากมาย...", phaseType: 'burden', hint: "คลิกค้างไว้และพยายามลากขึ้นไป" },
            { text: "มีหลายคนคาดหวังในตัวฉัน... จนฉันไม่รู้ว่าจะทำอย่างไรดี", phaseType: 'burden', hint: "แรงโน้มถ่วงกำลังดึงมันลงมา" },
            { text: "ทำไมกลุ่มคนบางคนถึงเอาแต่ด่าว่า ตัดพ้อ และสิ้นหวังในตัวฉัน...", phaseType: 'attack', hint: "ขยับเมาส์เพื่อปัดเป่าคำพูดเหล่านั้น" },
            { text: "ในบางครั้งฉันรู้สึกเจ็บปวด... และมีน้ำตา", phaseType: 'attack', hint: "ปกป้องความรู้สึกของคุณ" },
            { text: "แต่ถึงอย่างนั้น... ฉันก็ไม่อยากทิ้งใครไว้ข้างหลังเลย", phaseType: 'scatter', hint: "ทุกอย่างกำลังแตกสลาย" },
            { text: "เราทุกคนจะต้องก้าวเดินไปด้วยกัน...", phaseType: 'gather', hint: "กวาดเมาส์เพื่อรวบรวมพวกเขาให้กลับมา" },
            { text: "ไปถึงจุดหมายปลายทางของเรา", phaseType: 'gather', hint: "ดึงพวกเขาเข้ามาใกล้ๆ" },
            { text: "และในที่สุด...", phaseType: 'light', hint: "" },
            { text: "แสงสว่างจะคอยนำทางเราเสมอ", phaseType: 'end', hint: "" }
        ];

        let currentNode = 0;
        let gameObjects = [];
        let particles = [];
        
        // Resize Handler
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouse.x = width / 2;
            mouse.y = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Input Listeners
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mousedown', () => mouse.isDown = true);
        window.addEventListener('mouseup', () => mouse.isDown = false);
        window.addEventListener('touchstart', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            mouse.isDown = true;
        });
        window.addEventListener('touchend', () => mouse.isDown = false);
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        // Audio System Initialization
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playAmbientDrone() {
            if (!audioCtx) return;
            if (ambientOscillator) {
                ambientGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
                ambientOscillator.stop(audioCtx.currentTime + 1);
            }
            ambientOscillator = audioCtx.createOscillator();
            ambientGain = audioCtx.createGain();
            
            ambientOscillator.type = 'sine';
            ambientOscillator.frequency.setValueAtTime(45, audioCtx.currentTime); // Deep hum
            
            ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
            ambientGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 3);
            
            ambientOscillator.connect(ambientGain);
            ambientGain.connect(audioCtx.destination);
            ambientOscillator.start();
        }

        function playGlassShatter() {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.15;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 2000;
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        function playChime(frequency, delay = 0) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime + delay);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime + delay);
            gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + delay + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + delay);
            osc.stop(audioCtx.currentTime + delay + 4);
        }

        function playEndingMusic() {
            if (ambientOscillator) {
                ambientGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
            }
            // A major chord sequence for hope
            const notes = [440, 554.37, 659.25, 880]; 
            notes.forEach((freq, index) => {
                playChime(freq, index * 0.5);
                playChime(freq * 2, index * 0.5 + 2); // octave higher
            });
            setTimeout(() => {
                 notes.forEach((freq, index) => {
                    playChime(freq, index * 0.3);
                });
            }, 4000);
        }

        // Classes for Game Entities
        class Burden {
            constructor() {
                this.x = width / 2;
                this.y = height - 100;
                this.radius = 60;
                this.vy = 0;
                this.gravity = 0.2;
                this.dragForce = 0.5;
            }

            update() {
                if (mouse.isDown) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < this.radius + 50) {
                        this.vy -= this.dragForce; 
                        this.x += dx * 0.05; // slight horizontal follow
                    }
                }

                this.vy += this.gravity;
                this.y += this.vy;
                this.vy *= 0.9; // friction

                if (this.y > height - this.radius) {
                    this.y = height - this.radius;
                    this.vy = 0;
                }
                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.vy = 0;
                }
                
                // Return to center horizontally slowly
                this.x += (width/2 - this.x) * 0.02;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(40, 40, 40, 0.8)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Inner core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.6 + Math.sin(Date.now() * 0.002) * 5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(80, 80, 80, 0.5)';
                ctx.fill();
            }
        }

        class Attack {
            constructor() {
                this.x = Math.random() < 0.5 ? -50 : width + 50;
                this.y = Math.random() * height;
                this.targetX = width / 2 + (Math.random() * 200 - 100);
                this.targetY = height / 2 + (Math.random() * 200 - 100);
                
                const angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                const speed = 3 + Math.random() * 4;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.length = 40 + Math.random() * 60;
                this.active = true;
                this.color = `rgba(255, 255, 255, ${0.4 + Math.random() * 0.4})`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Collision with mouse defense
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < mouse.radius + 20) {
                    this.active = false;
                    playGlassShatter();
                    createParticles(this.x, this.y, 5, 'shard');
                }

                if (this.x < -100 || this.x > width + 100 || this.y < -100 || this.y > height + 100) {
                    this.active = false;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        class CompanionParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.radius = 2 + Math.random() * 3;
                this.color = 'rgba(200, 200, 200, 0.8)';
                this.gathered = false;
            }

            update(phaseType) {
                if (phaseType === 'scatter') {
                    this.vx *= 0.98;
                    this.vy *= 0.98;
                    // Drift
                    this.vx += (Math.random() - 0.5) * 0.2;
                    this.vy += (Math.random() - 0.5) * 0.2;
                } else if (phaseType === 'gather') {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 300) {
                        this.vx += dx * 0.001;
                        this.vy += dy * 0.001;
                    }
                    
                    this.vx *= 0.95;
                    this.vy *= 0.95;

                    if (dist < 50) this.gathered = true;
                    else this.gathered = false;
                } else if (phaseType === 'light' || phaseType === 'end') {
                    const dx = (width/2) - this.x;
                    const dy = (height/2) - this.y;
                    this.vx += dx * 0.01;
                    this.vy += dy * 0.01;
                    this.vx *= 0.9;
                    this.vy *= 0.9;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.gathered ? 'rgba(255, 255, 255, 1)' : this.color;
                ctx.fill();
                if (this.gathered) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#fff';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        class VisualParticle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createParticles(x, y, count, type) {
            for (let i = 0; i < count; i++) {
                particles.push(new VisualParticle(x, y, type));
            }
        }

        let mainBurden = new Burden();
        let attacks = [];
        let companions = [];
        
        function progressStory() {
            textContainer.classList.remove('visible');
            interactionHint.style.opacity = 0;
            
            setTimeout(() => {
                currentNode++;
                if (currentNode < storyNodes.length) {
                    setupPhase(storyNodes[currentNode]);
                }
            }, 2000);
        }

        function setupPhase(node) {
            phase = node.phaseType;
            textContent.innerText = node.text;
            interactionHint.innerText = node.hint;
            
            if (phase === 'burden') {
                if (currentNode === 0) playAmbientDrone();
            } 
            else if (phase === 'scatter') {
                // Break burden into companions
                for(let i=0; i<60; i++) {
                    companions.push(new CompanionParticle(mainBurden.x, mainBurden.y));
                }
                mainBurden = null;
                playGlassShatter();
            }
            else if (phase === 'light') {
                playEndingMusic();
                whiteScreen.style.opacity = 1;
                textContainer.style.zIndex = 20;
                textContent.classList.add('final-text');
            }

            textContainer.classList.add('visible');
            if (node.hint) {
                setTimeout(() => { interactionHint.style.opacity = 0.6; }, 1000);
            }

            // Auto progression logic based on phase completion or time
            if (phase === 'burden') {
                setTimeout(progressStory, 7000);
            } else if (phase === 'attack') {
                setTimeout(progressStory, 8000);
            } else if (phase === 'scatter') {
                setTimeout(progressStory, 6000);
            } else if (phase === 'gather') {
                setTimeout(progressStory, 7000);
            } else if (phase === 'light') {
                setTimeout(progressStory, 5000);
            }
        }

        // Main Game Loop
        function animate() {
            // Trail effect background
            ctx.fillStyle = phase === 'light' || phase === 'end' ? 'rgba(255, 255, 255, 0.2)' : 'rgba(3, 3, 3, 0.3)';
            ctx.fillRect(0, 0, width, height);

            if (phase === 'burden' && mainBurden) {
                mainBurden.update();
                mainBurden.draw();
            }

            if (phase === 'attack') {
                if (Math.random() < 0.1) attacks.push(new Attack());
                
                // Draw defensive aura around mouse
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, mouse.radius, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fill();

                attacks.forEach(a => {
                    a.update();
                    a.draw();
                });
                attacks = attacks.filter(a => a.active);
            }

            if (phase === 'scatter' || phase === 'gather' || phase === 'light' || phase === 'end') {
                if (phase === 'gather') {
                    // Draw magnetic pull
                    ctx.beginPath();
                    ctx.arc(mouse.x, mouse.y, 300, 0, Math.PI*2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                    ctx.stroke();
                }

                companions.forEach(c => {
                    c.update(phase);
                    c.draw();
                });
            }

            // Visual particles (shards etc)
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            particles = particles.filter(p => p.life > 0);

            animationId = requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', () => {
            initAudio();
            startBtn.style.display = 'none';
            setupPhase(storyNodes[currentNode]);
            animate();
        });

    </script>
</body>
</html>
