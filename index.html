<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Weight We Carry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #ffffff;
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            user-select: none;
            transition: background-color 3s ease;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .text-container {
            max-width: 800px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease, transform 2s ease;
        }

        .text-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-size: 2rem;
            font-weight: 400;
            line-height: 1.6;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .sub-text {
            font-size: 1.2rem;
            font-weight: 300;
            color: #aaaaaa;
            margin-top: 20px;
        }

        .harsh-word {
            position: absolute;
            color: rgba(255, 50, 50, 0.7);
            font-weight: 600;
            font-size: 1.5rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        .btn {
            margin-top: 40px;
            padding: 12px 30px;
            border: 1px solid #ffffff;
            background: transparent;
            color: #ffffff;
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* Ending Transition */
        body.light-ending {
            background-color: #ffffff;
            color: #000000;
        }

        body.light-ending h1 {
            text-shadow: none;
            font-weight: 600;
            color: #222222;
        }

        body.light-ending .btn {
            border-color: #000000;
            color: #000000;
        }

        body.light-ending .btn:hover {
            background: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="text-container" id="story-box">
            <h1 id="main-text"></h1>
            <p class="sub-text" id="instruction-text"></p>
            <button class="btn" id="action-btn">เริ่มต้นการเดินทาง</button>
        </div>
    </div>

    <script>
        // --- Web Audio API Setup (Synthesized Sounds) ---
        let audioCtx;
        const masterGain = 0.3;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playDroneSound(frequency, duration, type = 'sine', volume = 0.5) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume * masterGain, audioCtx.currentTime + 1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playNoise(duration) {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.5);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

            noise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            noise.start();
        }

        function playUpliftingChord() {
            if (!audioCtx) return;
            const frequencies = [261.63, 329.63, 392.00, 523.25]; // C Major Chord
            frequencies.forEach((freq, index) => {
                setTimeout(() => {
                    playDroneSound(freq, 5, 'triangle', 0.2);
                }, index * 200);
            });
        }

        // --- Canvas Particle System ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let sceneState = 0;
        let targetX = 0;
        let targetY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            targetX = width / 2;
            targetY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = 'rgba(255, 255, 255, 0.5)';
                this.life = Math.random();
            }
            update(state) {
                if (state === 1) {
                    // Heavy burden: Particles move slowly downwards
                    this.y += 0.5;
                    this.speedX *= 0.99;
                    if (this.y > height) this.y = 0;
                } else if (state === 2) {
                    // Chaos/Harsh words: Fast, erratic movement
                    this.x += (Math.random() - 0.5) * 5;
                    this.y += (Math.random() - 0.5) * 5;
                } else if (state === 3) {
                    // Gathering/Holding on: Particles pull towards center
                    const dx = targetX - this.x;
                    const dy = targetY - this.y;
                    this.x += dx * 0.01;
                    this.y += dy * 0.01;
                } else if (state === 4) {
                    // Light expanding: Particles move outwards and fade
                    const dx = this.x - targetX;
                    const dy = this.y - targetY;
                    this.x += dx * 0.02;
                    this.y += dy * 0.02;
                    this.size += 0.05;
                } else {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > width) this.speedX *= -1;
                    if (this.y < 0 || this.y > height) this.speedY *= -1;
                }
            }
            draw(state) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                if (state === 2) {
                    ctx.fillStyle = Math.random() > 0.9 ? 'rgba(255, 50, 50, 0.8)' : 'rgba(200, 200, 200, 0.5)';
                } else if (state === 4) {
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.6)'; // Soft gold
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                }
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) {
            particles.push(new Particle());
        }

        function animate() {
            if (sceneState === 4) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            } else {
                ctx.fillStyle = 'rgba(3, 3, 3, 0.2)';
            }
            ctx.fillRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update(sceneState);
                p.draw(sceneState);
            });
            
            requestAnimationFrame(animate);
        }
        animate();

        // --- Story Progression Logic ---
        const storyBox = document.getElementById('story-box');
        const mainText = document.getElementById('main-text');
        const instText = document.getElementById('instruction-text');
        const btn = document.getElementById('action-btn');

        const storyData = [
            {
                text: "มีบางสิ่ง... ที่ฉันแบกรับไว้มากมาย",
                inst: "คลิกหน้าจอเพื่อก้าวเดินต่อไป",
                btnText: "ก้าวต่อไป",
                sound: () => playDroneSound(65.41, 4, 'sine', 0.8), // C2 heavy
                state: 1
            },
            {
                text: "เสียงวิจารณ์ ความคาดหวัง และความผิดหวังของใครหลายคน<br>ทำไมพวกเขาถึงตัดพ้อในตัวฉัน?",
                inst: "ความเจ็บปวดก่อตัวขึ้น...",
                btnText: "อดทนไว้",
                sound: () => playDroneSound(130.81, 3, 'sawtooth', 0.4), // C3 harsh
                state: 2,
                action: spawnHarshWords
            },
            {
                text: "ฉันเจ็บปวด ฉันมีน้ำตา<br>แต่ฉันก็รู้ว่าจุดหมายปลายทางของเราคือสิ่งสำคัญ",
                inst: "รวบรวมทุกคนเข้าด้วยกัน",
                btnText: "จับมือไว้",
                sound: () => playNoise(4), // Rain/Wind noise
                state: 3
            },
            {
                text: "ฉันจะไม่ทิ้งใครไว้ข้างหลัง<br>เราทุกคนจะต้องก้าวเดินไปด้วยกัน",
                inst: "แสงสว่างกำลังปรากฏ...",
                btnText: "ค้นพบแสงสว่าง",
                sound: () => playDroneSound(261.63, 4, 'sine', 0.5), // C4 clear
                state: 3
            },
            {
                text: "ในที่สุดความมืดมิดก็จางหายไป<br>และแสงสว่างนำทางพวกเราทุกคน",
                inst: "การเดินทางร่วมกันเริ่มต้นขึ้นอย่างแท้จริง",
                btnText: "เริ่มต้นใหม่",
                sound: () => playUpliftingChord(),
                state: 4
            }
        ];

        let currentStep = -1;

        function typeWriterEffect(text, element, speed = 50, callback) {
            element.innerHTML = "";
            let i = 0;
            let isTag = false;
            let textToType = text;

            function typing() {
                if (i < textToType.length) {
                    if (textToType.charAt(i) === '<') isTag = true;
                    if (textToType.charAt(i) === '>') isTag = false;
                    
                    element.innerHTML += textToType.charAt(i);
                    i++;
                    
                    if (isTag) {
                        typing();
                    } else {
                        setTimeout(typing, speed);
                    }
                } else if (callback) {
                    callback();
                }
            }
            typing();
        }

        function fadeOut(callback) {
            storyBox.classList.remove('visible');
            btn.classList.remove('visible');
            setTimeout(callback, 2000);
        }

        function advanceStory() {
            if (currentStep === -1) {
                initAudio();
            }
            
            currentStep++;
            if (currentStep >= storyData.length) {
                currentStep = 0;
                document.body.classList.remove('light-ending');
                sceneState = 0;
                particles.forEach(p => p.reset());
            }

            const data = storyData[currentStep];
            sceneState = data.state;
            
            if (data.sound) data.sound();
            if (data.action) data.action();

            if (sceneState === 4) {
                document.body.classList.add('light-ending');
            }

            fadeOut(() => {
                instText.innerText = "";
                btn.innerText = data.btnText;
                
                storyBox.classList.add('visible');
                typeWriterEffect(data.text, mainText, 40, () => {
                    setTimeout(() => {
                        instText.innerText = data.inst;
                        btn.classList.add('visible');
                    }, 500);
                });
            });
        }

        function spawnHarshWords() {
            const words = ["ภาระ", "ทำไมทำไม่ได้?", "สิ้นหวัง", "อ่อนแอ", "ผิดหวังในตัวเธอ"];
            let count = 0;
            const interval = setInterval(() => {
                if (sceneState !== 2 || count > 15) {
                    clearInterval(interval);
                    return;
                }
                const el = document.createElement('div');
                el.className = 'harsh-word';
                el.innerText = words[Math.floor(Math.random() * words.length)];
                el.style.left = Math.random() * 80 + 10 + '%';
                el.style.top = Math.random() * 80 + 10 + '%';
                document.body.appendChild(el);
                
                setTimeout(() => { el.style.opacity = 1; }, 10);
                setTimeout(() => { 
                    el.style.opacity = 0; 
                    setTimeout(() => el.remove(), 500);
                }, 1500);
                
                count++;
            }, 800);
        }

        btn.addEventListener('click', advanceStory);

        // Initial Reveal
        setTimeout(() => {
            storyBox.classList.add('visible');
            btn.classList.add('visible');
        }, 1000);

    </script>
</body>
</html>
